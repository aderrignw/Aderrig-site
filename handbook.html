<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Handbook — Aderrig NW</title>
<link rel="stylesheet" href="assets/style.css" />
<style>
  .hb-wrap{display:grid;grid-template-columns:320px minmax(0,1fr);gap:18px;align-items:start}
  .hb-side .card,.hb-main .card{padding:18px}
  .hb-search{margin-bottom:12px}
  .hb-search input{width:100%}
  .hb-cat-list,.hb-item-list{display:grid;gap:10px}
  .hb-cat-btn,.hb-item-btn{width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px 14px;cursor:pointer}
  .hb-cat-btn.active,.hb-item-btn.active{border-color:rgba(47,125,91,.34);background:#f7fbf8}
  .hb-item-summary{color:var(--muted);font-size:.92rem;margin-top:4px}
  .hb-meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px}
  .hb-chip{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:#f4f7f5;border:1px solid rgba(0,0,0,.08);font-size:.82rem}
  .hb-hero{width:100%;max-height:420px;object-fit:cover;border-radius:18px;border:1px solid var(--line);background:#f7faf8}
  .hb-content{line-height:1.7;white-space:pre-wrap}
  .hb-links{display:grid;gap:10px;margin-top:18px}
  .hb-link{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;text-decoration:none;color:inherit}
  .hb-empty{color:var(--muted)}
  @media (max-width: 920px){.hb-wrap{grid-template-columns:1fr}}
</style>
<script>
window.ANW_KEYS = window.ANW_KEYS || {};
const KEY_HANDBOOK_CATEGORIES = (window.ANW_KEYS && window.ANW_KEYS.HANDBOOK_CATEGORIES) || 'anw_handbook_categories';
const KEY_HANDBOOK_ITEMS = (window.ANW_KEYS && window.ANW_KEYS.HANDBOOK_ITEMS) || 'anw_handbook_items';
function safeRead(key, fallback){
  try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch(_){ return fallback; }
}
function byId(id){ return document.getElementById(id); }
function esc(v){ return String(v == null ? '' : v).replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }
function slugify(v){ return String(v||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
function normalizeCats(list){
  return (Array.isArray(list)?list:[])
    .filter(c => c && String(c.status || c.active ? 'active' : c.status || '').toLowerCase() !== 'draft')
    .map((c,i)=>({
      id: c.id || c.key || slugify(c.title || c.name || ('cat-'+i)),
      title: String(c.title || c.name || 'Untitled').trim(),
      icon: String(c.icon || '').trim(),
      order: Number(c.order || i+1) || (i+1),
      active: c.active !== false && String(c.status || 'active').toLowerCase() !== 'inactive'
    }))
    .filter(c => c.active)
    .sort((a,b)=>a.order-b.order || a.title.localeCompare(b.title));
}
function normalizeLinks(item){
  if(Array.isArray(item.attachments)) return item.attachments.filter(Boolean).map(a => ({ label:String(a.label||a.title||a.name||'Open link').trim(), url:String(a.url||a.href||'').trim() })).filter(a=>a.url);
  const raw = String(item.attachments || '').trim();
  if(!raw) return [];
  return raw.split(/
+/).map(line => {
    const parts = line.split('|');
    const label = String(parts[0] || 'Open link').trim();
    const url = String(parts[1] || parts[0] || '').trim();
    return {label, url};
  }).filter(a=>/^https?:/i.test(a.url));
}
function normalizeItems(list){
  return (Array.isArray(list)?list:[]).map((item,i)=>({
    id: item.id || slugify(item.title || ('item-'+i)),
    categoryId: item.categoryId || item.category || item.categoryKey || '',
    title: String(item.title || 'Untitled').trim(),
    summary: String(item.summary || '').trim(),
    content: String(item.content || '').trim(),
    type: String(item.type || 'page').toLowerCase(),
    status: String(item.status || 'draft').toLowerCase(),
    url: String(item.url || '').trim(),
    heroUrl: String(item.heroUrl || item.image || '').trim(),
    attachments: normalizeLinks(item)
  })).filter(item => item.status === 'published');
}
let CATS = [];
let ITEMS = [];
let activeCat = '';
let activeItem = '';
function getItemsForCat(catId, query){
  const q = String(query || '').trim().toLowerCase();
  return ITEMS.filter(item => {
    const inCat = !catId || item.categoryId === catId;
    const inQuery = !q || [item.title, item.summary, item.content].join(' ').toLowerCase().includes(q);
    return inCat && inQuery;
  });
}
function renderCats(query){
  const wrap = byId('hbCatList');
  if(!wrap) return;
  const counts = new Map();
  getItemsForCat('', query).forEach(item => counts.set(item.categoryId, (counts.get(item.categoryId)||0)+1));
  wrap.innerHTML = '';
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.type='button'; btn.className='hb-cat-btn' + (activeCat===cat.id ? ' active':'');
    btn.innerHTML = `<div style="font-weight:800;">${esc(cat.icon ? cat.icon + ' ' + cat.title : cat.title)}</div><div class="hb-item-summary">${counts.get(cat.id)||0} item(ns)</div>`;
    btn.onclick = () => { activeCat = cat.id; const items=getItemsForCat(activeCat, byId('hbSearch').value); activeItem = items[0] ? items[0].id : ''; renderAll(); };
    wrap.appendChild(btn);
  });
}
function renderItems(){
  const wrap = byId('hbItemList');
  const empty = byId('hbItemEmpty');
  const items = getItemsForCat(activeCat, byId('hbSearch').value);
  wrap.innerHTML='';
  empty.style.display = items.length ? 'none':'block';
  if(!activeItem && items[0]) activeItem = items[0].id;
  if(activeItem && !items.some(i=>i.id===activeItem)) activeItem = items[0] ? items[0].id : '';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.type='button'; btn.className='hb-item-btn' + (activeItem===item.id ? ' active':'');
    btn.innerHTML = `<div style="font-weight:800;">${esc(item.title)}</div>${item.summary ? `<div class="hb-item-summary">${esc(item.summary)}</div>`:''}`;
    btn.onclick = () => { activeItem = item.id; renderDetail(); renderItems(); };
    wrap.appendChild(btn);
  });
}
function renderDetail(){
  const host = byId('hbDetail');
  const item = ITEMS.find(i=>i.id===activeItem) || getItemsForCat(activeCat, byId('hbSearch').value)[0];
  if(!item){ host.innerHTML = '<p class="hb-empty">No published handbook item found.</p>'; return; }
  const cat = CATS.find(c=>c.id===item.categoryId);
  const chips = [];
  if(cat) chips.push(`<span class="hb-chip">${esc(cat.icon ? cat.icon + ' ' + cat.title : cat.title)}</span>`);
  if(item.type === 'link') chips.push('<span class="hb-chip">External link</span>');
  const linksHtml = item.attachments.length ? `<div class="hb-links">${item.attachments.map(link => `<a class="hb-link" href="${esc(link.url)}" target="_blank" rel="noopener"><span>${esc(link.label)}</span><span aria-hidden="true">↗</span></a>`).join('')}</div>` : '';
  const cta = item.type === 'link' && item.url ? `<p><a class="btn" href="${esc(item.url)}" target="_blank" rel="noopener">Open link</a></p>` : '';
  host.innerHTML = `
    <h2 style="margin-top:0;">${esc(item.title)}</h2>
    <div class="hb-meta">${chips.join('')}</div>
    ${item.summary ? `<p class="muted" style="margin-top:0;">${esc(item.summary)}</p>` : ''}
    ${item.heroUrl ? `<img class="hb-hero" src="${esc(item.heroUrl)}" alt="${esc(item.title)}" />` : ''}
    ${item.content ? `<div class="hb-content" style="margin-top:18px;">${esc(item.content)}</div>` : ''}
    ${cta}
    ${linksHtml}
  `;
}
function renderAll(){ renderCats(byId('hbSearch').value); renderItems(); renderDetail(); }
function init(){
  CATS = normalizeCats(safeRead(KEY_HANDBOOK_CATEGORIES, []));
  ITEMS = normalizeItems(safeRead(KEY_HANDBOOK_ITEMS, []));
  activeCat = CATS[0] ? CATS[0].id : '';
  const initial = getItemsForCat(activeCat, '');
  activeItem = initial[0] ? initial[0].id : '';
  byId('hbSearch').addEventListener('input', renderAll);
  renderAll();
}
window.addEventListener('DOMContentLoaded', init);
</script>
</head>
<body>
<header class="site-header">
  <div class="brand">
    <a class="site-logo" href="index.html"><img alt="Aderrig Neighbourhood Watch" class="logo-img" src="assets/logo/logo.png"/></a>
    <div class="brand-text"><h1>Aderrig NW</h1><p class="muted">Adamstown</p></div>
  </div>
  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a class="active" href="handbook.html">Handbook</a>
    <a href="report.html">Report</a>
    <a href="alerts.html">Community Alerts</a>
    <a href="projects.html">Community Projects</a>
    <a class="nav-login" href="login.html">Login / Register</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="household.html">Household</a>
  </nav>
</header>
<main class="wrap">
  <section class="card">
    <h2 style="margin-top:0;">Resident Handbook</h2>
    <p class="muted">Published guidance for residents. Use the search box or browse by category.</p>
  </section>
  <div class="hb-wrap" style="margin-top:18px;">
    <aside class="hb-side" style="display:grid; gap:18px;">
      <section class="card">
        <div class="hb-search"><label for="hbSearch">Search</label><input id="hbSearch" type="text" placeholder="Search handbook..." /></div>
        <h3 style="margin:0 0 10px;">Categories</h3>
        <div id="hbCatList" class="hb-cat-list"></div>
      </section>
      <section class="card">
        <h3 style="margin:0 0 10px;">Items</h3>
        <div id="hbItemList" class="hb-item-list"></div>
        <p id="hbItemEmpty" class="hb-empty" style="display:none; margin:10px 0 0;">No published item in this category.</p>
      </section>
    </aside>
    <section class="hb-main">
      <article id="hbDetail" class="card"></article>
    </section>
  </div>
</main>
<footer class="site-footer"><div class="page-access">Public</div></footer>
</body>
</html>
