<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard — Clean Profile</title>
<link href="assets/style.css" rel="stylesheet"/>
<style>
.profile-card{border:1px solid #e5e7eb;border-radius:16px;padding:16px;background:#fff;margin-top:10px}
.profile-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
.profile-name{font-size:28px;font-weight:800;margin:0}
.profile-badge{padding:6px 12px;border-radius:999px;background:#e6f4ea;color:#1f7a3f;font-weight:700}
.profile-chip{display:inline-block;padding:6px 10px;border-radius:999px;background:#f1f5f9;margin:4px;font-size:12px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.avatar{width:120px;height:120px;border-radius:16px;object-fit:cover}
</style>
</head>
<body>
<main class="wrap">
<section class="card">
<h2>Profile</h2>

<div class="profile-card">
<div class="profile-head">
<div>
<div>Registration No <strong id="pfReg">—</strong></div>
<h3 class="profile-name" id="pfName">Resident</h3>
<span class="profile-badge" id="pfStatus">Pending</span>
</div>
<div>
<img id="pfAvatar" class="avatar" src="assets/default-avatar.png"/>
</div>
</div>

<div class="profile-grid">
<div><strong>Primary role:</strong> <span id="pfRole">Resident</span></div>
<div><strong>Resident type:</strong> <span id="pfType">—</span></div>
<div><strong>Address:</strong> <span id="pfAddress">—</span></div>
<div><strong>Eircode:</strong> <span id="pfEir">—</span></div>
</div>

<div>
<strong>Volunteer positions:</strong>
<div id="pfVol"></div>
</div>
</div>

<div class="card">
<label>Phone</label>
<input id="pfPhone"/>

<label>Email</label>
<input id="pfEmail" disabled/>

<label>Management company</label>
<input id="pfMgmt"/>

<button onclick="save()">Save</button>
</div>

</section>
</main>

<script>
const user = JSON.parse(localStorage.getItem('anw_user')||'{}');

function load(){
document.getElementById('pfReg').textContent=user.regId||'—';
document.getElementById('pfName').textContent=user.name||'Resident';
document.getElementById('pfStatus').textContent=(user.active?'Active':'Pending');
document.getElementById('pfRole').textContent=user.role||'Resident';
document.getElementById('pfType').textContent=user.type||'—';
document.getElementById('pfAddress').textContent=user.address||'—';
document.getElementById('pfEir').textContent=user.eircode||'—';
document.getElementById('pfPhone').value=user.phone||'';
document.getElementById('pfEmail').value=user.email||'';
document.getElementById('pfMgmt').value=user.mgmt||'';
document.getElementById('pfAvatar').src=user.avatar||'assets/default-avatar.png';

const vol = document.getElementById('pfVol');
vol.innerHTML='';
(user.vol||[]).forEach(v=>{
const el=document.createElement('span');
el.className='profile-chip';
el.textContent=v;
vol.appendChild(el);
});
}

function save(){
user.phone=document.getElementById('pfPhone').value;
user.mgmt=document.getElementById('pfMgmt').value;
localStorage.setItem('anw_user',JSON.stringify(user));
alert('Saved');
}

load();
</script>
</body>
</html>
