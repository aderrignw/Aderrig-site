<script>
// --- Community Projects tabs + ACL gating (tabs visible; blocked tabs show notice and do not open) ---
document.addEventListener('DOMContentLoaded', async () => {
  const notice = document.getElementById('anwAccessNotice');
  const showNotice = (html) => {
    if (!notice) return;
    notice.style.display = 'block';
    notice.innerHTML = html;
  };
  const hideNotice = () => {
    if (notice) {
      notice.style.display = 'none';
      notice.innerHTML = '';
    }
  };

  // Scope ONLY to Projects sub-tabs (do not touch main NAV)
  const tabButtons = Array.from(document.querySelectorAll('button.proj-tab'));
  const panesById = {
    builder: document.getElementById('paneBuilder'),
    send: document.getElementById('paneSend'),
    monitoring: document.getElementById('paneMonitoring'),
  };

  const OWNER_EMAIL = 'claudiosantos1968@gmail.com';

  const norm = (s) =>
    String(s || '')
      .toLowerCase()
      .replace(/[\s\-_]+/g, ' ')
      .replace(/[^a-z0-9@. ]/g, '')
      .trim();

  const sameEmail = (a, b) => norm(a) === norm(b);

  const inferTabKey = (btn) => {
    const t = norm(btn.textContent);
    if (t.includes('build')) return 'builder';
    if (t.includes('confirm')) return 'send';
    if (t.includes('monitor')) return 'monitoring';
    return btn.getAttribute('data-tab-key') || 'builder';
  };

  // Map each sub-tab to an ACL feature key (must match Admin)
  const featureFor = (tabKey) => ({
    builder: 'projects:tab_builder',
    send: 'projects:tab_published',
    monitoring: 'projects:tab_monitoring',
  }[tabKey] || 'projects:tab_builder');

  // Read ACL (store-backed on Netlify; fallback to default in app-core)
  const getAclSync = () => {
    try { return (window.anwGetAclSync && window.anwGetAclSync()) || null; }
    catch (e) { return null; }
  };
  const getDefaultAcl = () => {
    try { return window.ANW_ACL_DEFAULT || null; }
    catch (e) { return null; }
  };

  const extractRoles = (profile, email) => {
    const out = [];
    const pushAny = (v) => {
      if (!v) return;
      if (Array.isArray(v)) {
        v.forEach(pushAny);
        return;
      }
      out.push(String(v));
    };

    if (profile) {
      pushAny(profile.type);
      pushAny(profile.role);
      pushAny(profile.roles);
      pushAny(profile.position);
      pushAny(profile.title);
      pushAny(profile.access);
      pushAny(profile.residentType);
    }

    // hard guarantee for master owner email
    if (sameEmail(email, OWNER_EMAIL)) {
      out.push('owner');
    }

    return out.map(norm).filter(Boolean);
  };

  const hasAnyRole = (profile, email, allowed) => {
    const mine = extractRoles(profile, email);
    const allow = (allowed || []).map(norm);
    if (allow.includes('public')) return true;
    return mine.some(r => allow.some(a => r === a || r.includes(a) || a.includes(r)));
  };

  const ensureUser = async () => {
    if (!window.netlifyIdentity) return null;
    return await new Promise((resolve) => {
      let done = false;
      const finish = (u) => {
        if (done) return;
        done = true;
        resolve(u || null);
      };

      try {
        window.netlifyIdentity.on('init', (u) => finish(u));
        window.netlifyIdentity.init();
      } catch (e) {}

      setTimeout(() => {
        try {
          finish(window.netlifyIdentity.currentUser && window.netlifyIdentity.currentUser());
        } catch (e) {
          finish(null);
        }
      }, 300);
    });
  };

  const getProfile = async (user) => {
    try { await window.anwInitStore?.(); } catch (e) {}

    try {
      const users = (window.anwLoad && window.ANW_KEYS)
        ? window.anwLoad(window.ANW_KEYS.USERS, [])
        : [];

      const email = String(user?.email || '').toLowerCase().trim();

      return (users || []).find(u =>
        String(u?.email || '').toLowerCase().trim() === email
      ) || null;
    } catch (e) {
      return null;
    }
  };

  const isApproved = (profile, email) => {
    if (sameEmail(email, OWNER_EMAIL)) return true;
    if (!profile) return false;

    const status = String(
      profile.status ||
      profile.accountStatus ||
      profile.registrationStatus ||
      ''
    ).toLowerCase().trim();

    return (
      profile.approved === true ||
      profile.active === true ||
      status === 'active' ||
      status === 'approved'
    );
  };

  const isFile = (location && location.protocol === 'file:');
  const localPreviewAcl = {
    'projects:tab_builder': [],
    'projects:tab_published': [],
    'projects:tab_monitoring': [],
  };

  const user = isFile ? null : await ensureUser();
  const email = String(
    user?.email ||
    (typeof window.anwGetLoggedEmail === 'function' ? window.anwGetLoggedEmail() : '') ||
    ''
  ).toLowerCase().trim();

  const profile = user ? await getProfile(user) : null;

  const canOpen = (tabKey) => {
    if (window.ANW_PUBLIC_MODE) return true;

    const acl = isFile ? localPreviewAcl : (getAclSync() || getDefaultAcl() || {});
    const feature = featureFor(tabKey);
    const allowed = acl[feature] || [];

    if (!user && !sameEmail(email, OWNER_EMAIL) && !isFile) {
      return Array.isArray(allowed) && allowed.map(norm).includes('public');
    }

    if (isFile) {
      return Array.isArray(allowed) && allowed.map(norm).includes('public');
    }

    // master owner can always open Projects tabs
    if (sameEmail(email, OWNER_EMAIL)) return true;

    // if logged but not registered/approved, block
    if (!profile || !isApproved(profile, email)) return false;

    return hasAnyRole(profile, email, allowed);
  };

  const setActive = (tabKey) => {
    tabButtons.forEach(b => {
      const k = inferTabKey(b);
      const isActive = (k === tabKey);
      b.classList.toggle('active', isActive);
      b.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });

    Object.entries(panesById).forEach(([k, pane]) => {
      if (!pane) return;
      pane.style.display = (k === tabKey) ? '' : 'none';
    });

    let label = document.getElementById('projSubtabLabel');
    if (!label) {
      const h = document.querySelector('h1, .page-title, h2');
      if (h) {
        label = document.createElement('div');
        label.id = 'projSubtabLabel';
        label.style.marginTop = '6px';
        label.style.fontSize = '14px';
        label.style.opacity = '0.8';
        h.insertAdjacentElement('afterend', label);
      }
    }

    if (label) {
      const txt = ({
        builder: 'Build project',
        send: 'Confirm sending',
        monitoring: 'Monitoring'
      }[tabKey] || 'Build project');

      label.textContent = 'Community Projects › ' + txt;
    }
  };

  // Initial state
  let initial = 'builder';
  const marked = tabButtons.find(b => b.classList.contains('active') || b.getAttribute('aria-selected') === 'true');
  if (marked) initial = inferTabKey(marked);
  setActive(initial);

  // Initial gate
  if (!email) {
    Object.values(panesById).forEach(p => { if (p) p.style.display = 'none'; });
    showNotice('Exclusive area. Please <a href="login.html">log in</a> to continue.');
  } else if (!canOpen(initial)) {
    Object.values(panesById).forEach(p => { if (p) p.style.display = 'none'; });
    showNotice('Exclusive area. Please <a href="login.html">log in</a> to continue.');
  } else {
    hideNotice();
    setActive(initial);
  }

  tabButtons.forEach(btn => {
    btn.addEventListener('click', (ev) => {
      const tabKey = inferTabKey(btn);

      if (!canOpen(tabKey)) {
        ev.preventDefault();
        ev.stopPropagation();
        showNotice('Exclusive area. Please <a href="login.html">log in</a> to continue.');
        return;
      }

      hideNotice();
      setActive(tabKey);
    });
  });
});
</script>
